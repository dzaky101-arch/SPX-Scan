<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scan SPX">
    <meta name="description" content="Copyright @ Mbah Sugeng">
    <title>Scan Paket SPX</title>
    <link rel="icon" href="https://raw.githubusercontent.com/dzaky101-arch/SPX-Scan/main/scanpaketSPX/logo_spx.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-blue-hover: #0056b3;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-red-hover: #d62218;
            --ios-bg: #000000;
            --ios-card-bg: #1c1c1e;
            --ios-card-bg-active: #2c2c2e;
            --ios-text: #ffffff;
            --ios-text-muted: #8e8e93;
            --ios-border: #38383a;
            --ios-input-bg: #2c2c2e;
            --ios-btn-primary-bg: #3a3a3c;
            --ios-btn-primary-text: #ffffff;
        }

        [data-theme="light"] {
            --ios-bg: #f2f2f7;
            --ios-card-bg: #ffffff;
            --ios-card-bg-active: #e5e5ea;
            --ios-text: #000000;
            --ios-text-muted: #8e8e93;
            --ios-border: #c6c6c8;
            --ios-input-bg: #f2f2f7;
            --ios-btn-primary-bg: #e5e5ea;
            --ios-btn-primary-text: #007aff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            padding: calc(2rem + env(safe-area-inset-top)) 1rem calc(2rem + env(safe-area-inset-bottom));
            line-height: 1.4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--ios-text-muted);
            margin-bottom: 1.2rem;
        }

        /* Action Buttons Area */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 400px) {
            .action-grid {
                grid-template-columns: 1fr 1fr;
            }
            .action-grid button:last-child {
                grid-column: span 2;
            }
        }

        button {
            font-family: inherit;
            font-size: 16px; /* Avoid auto-zoom in iOS Safari */
            font-weight: 600;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            height: 48px; /* iOS standard touch target height */
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-success { background-color: var(--ios-green); color: white; }
        .btn-info { background-color: var(--ios-blue); color: white; }
        .btn-primary { background-color: var(--ios-btn-primary-bg); color: var(--ios-btn-primary-text); }
        .btn-danger { background-color: rgba(255, 59, 48, 0.15); color: var(--ios-red); }
        .btn-danger:active { background-color: rgba(255, 59, 48, 0.3); }

        .card {
            background-color: var(--ios-card-bg);
            border-radius: 14px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--ios-border);
        }

        /* Form Layout */
        .form-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }
        .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            color: var(--ios-text-muted);
        }

        select, input[type="text"] {
            width: 100%;
            background-color: var(--ios-input-bg);
            color: var(--ios-text);
            border: 1px solid var(--ios-border);
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 16px; /* Critically avoids automatic zooming in iOS Safari */
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            height: 44px;
            -webkit-appearance: none; /* Reset native select border/styles */
            appearance: none;
        }
        /* Custom dropdown arrow for select elements */
        select-wrapper {
            position: relative;
            display: block;
            width: 100%;
        }
        select-wrapper::after {
            content: "▼";
            font-size: 0.65rem;
            color: var(--ios-text-muted);
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--ios-blue);
        }

        /* Scan Input Area */
        .scan-wrapper {
            display: flex;
            gap: 0.6rem;
        }

        /* Sound Button Control */
        .sound-toggle-btn {
            background: none;
            border: 1px solid var(--ios-border);
            border-radius: 10px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--ios-text-muted);
            cursor: pointer;
            padding: 0;
            transition: background-color 0.2s;
        }
        .sound-toggle-btn.active {
            color: var(--ios-blue);
            border-color: var(--ios-blue);
            background-color: rgba(0, 122, 255, 0.1);
        }

        /* List & History */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding: 0 0.2rem;
        }

        .list-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .list-header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .list-header .reset-link {
            font-size: 0.9rem;
            color: var(--ios-red);
            font-weight: 500;
            cursor: pointer;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .record-card {
            background-color: var(--ios-card-bg);
            border: 1px solid var(--ios-border);
            border-radius: 12px;
            padding: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .record-details {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            flex: 1;
            min-width: 0;
        }

        .record-meta {
            font-size: 0.75rem;
            color: var(--ios-text-muted);
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .badge-trip {
            background-color: var(--ios-card-bg-active);
            color: var(--ios-text-muted);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .record-resi {
            font-family: monospace;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--ios-blue);
            word-break: break-all;
        }

        .record-time {
            font-size: 0.78rem;
            color: var(--ios-text-muted);
        }

        .btn-delete-row {
            background: none;
            border: none;
            color: var(--ios-red);
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            margin-left: 0.3rem;
        }
        .btn-delete-row:active {
            background-color: rgba(255, 59, 48, 0.1);
        }

        .btn-qr-row {
            background: none;
            border: none;
            color: var(--ios-blue);
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
        }
        .btn-qr-row:active {
            background-color: rgba(0, 122, 255, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ios-text-muted);
        }
        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* Modal / Dialog Base Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            justify-content: center;
            align-items: flex-end; /* Bottom sheet on mobile */
        }
        @media (min-width: 600px) {
            .modal-overlay {
                align-items: center;
                padding: 1rem;
            }
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: var(--ios-card-bg);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px 16px 0 0;
            padding: 1.5rem;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.25, 1);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }
        @media (min-width: 600px) {
            .modal-card {
                border: 1px solid var(--ios-border);
                border-radius: 16px;
                max-width: 480px;
                animation: zoomIn 0.2s ease-out;
            }
        }

        /* Fullscreen Camera Modal for Mobile Devices */
        @media (max-width: 599px) {
            #cameraModal.modal-overlay {
                align-items: stretch;
            }
            #cameraModal .modal-card {
                height: 100vh;
                height: 100dvh;
                max-height: 100vh;
                max-height: 100dvh;
                border-radius: 0;
                border: none;
                padding: calc(1rem + env(safe-area-inset-top)) 1rem calc(1rem + env(safe-area-inset-bottom));
            }
        }
        #cameraModal .modal-body {
            padding: 0;
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--ios-border);
        }
        .modal-header h3 {
            font-size: 1.15rem;
            font-weight: 700;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--ios-text-muted);
            padding: 0.2rem;
            line-height: 1;
            width: auto;
            height: auto;
        }

        .modal-body textarea {
            width: 100%;
            height: 160px;
            background-color: var(--ios-input-bg);
            color: var(--ios-text);
            border: 1px solid var(--ios-border);
            border-radius: 10px;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 16px; /* Crucial for iOS Safari auto-zoom prevention */
            resize: none;
            margin-bottom: 1rem;
            outline: none;
        }
        .modal-body textarea:focus {
            border-color: var(--ios-blue);
        }

        .modal-footer {
            display: flex;
            gap: 0.8rem;
        }

        /* iOS Custom Alert / Confirm Box */
        .ios-alert-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .ios-alert-overlay.active {
            display: flex;
        }
        .ios-alert-card {
            background: var(--ios-card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            width: 270px;
            text-align: center;
            color: var(--ios-text);
            animation: iosAlertPop 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        @keyframes iosAlertPop {
            from { transform: scale(1.15); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .ios-alert-title {
            font-size: 17px;
            font-weight: 600;
            padding: 18px 16px 4px;
            margin: 0;
        }
        .ios-alert-message {
            font-size: 13px;
            padding: 0 16px 18px;
            margin: 0;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
        }
        .ios-alert-buttons {
            display: flex;
        }
        .ios-alert-buttons button {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 17px;
            font-weight: 400;
            padding: 12px 8px;
            margin: 0;
            flex: 1;
            cursor: pointer;
            outline: none;
            border-radius: 0;
            width: auto;
            height: auto;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }
        .ios-alert-buttons button:active {
            background-color: rgba(255, 255, 255, 0.08);
        }
        .ios-alert-buttons button.btn-danger-ios {
            color: #ff453a;
        }
        .ios-alert-buttons button.btn-bold {
            font-weight: 600;
        }
        .ios-alert-buttons .ios-divider {
            width: 0.5px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* QR CODE MODAL / SLIDESHOW STYLE */
        .qr-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .qr-modal-overlay.active {
            display: flex;
        }
        .qr-card-ios {
            background: #ffffff; /* White background for QR visibility */
            color: #000000;
            border-radius: 20px;
            padding: 2rem 1.5rem 1.5rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: iosAlertPop 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
        }
        .qr-tag-ios {
            font-size: 0.8rem;
            font-weight: 700;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .qr-code-wrapper {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.2rem;
            padding: 10px;
            border-radius: 12px;
            width: 240px;
            height: 240px;
            border: 1px solid #e5e5ea;
        }
        .qr-code-wrapper canvas,
        .qr-code-wrapper img {
            max-width: 100%;
            height: auto;
        }
        .qr-resi-label {
            font-family: monospace;
            font-size: 1.15rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 1.2rem;
            word-break: break-all;
        }
        .qr-nav-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .qr-nav-buttons button {
            background-color: #f2f2f7;
            color: #007aff;
            font-size: 15px;
            height: 40px;
            border-radius: 10px;
            flex: 1;
            width: auto;
        }
        .qr-nav-buttons button:active {
            background-color: #e5e5ea;
            transform: none;
        }
        .qr-nav-buttons button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .qr-action-buttons {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }
        .qr-action-buttons button {
            height: 44px;
            font-size: 15px;
            border-radius: 10px;
            flex: 1;
            width: auto;
        }
        .qr-btn-download {
            background-color: #007aff;
            color: #ffffff;
        }
        .qr-btn-share {
            background-color: #e5f1ff;
            color: #007aff;
        }
        .qr-btn-close {
            background-color: #f2f2f7;
            color: #ff3b30;
            height: 44px;
            border-radius: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="position: relative;">
            <button id="btnThemeToggle" style="position: absolute; top: 0; right: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--ios-card-bg-active); padding: 0; color: var(--ios-text); font-size: 1.2rem; border: 1px solid var(--ios-border);">☀️</button>
            <h1><img src="https://raw.githubusercontent.com/dzaky101-arch/SPX-Scan/main/scanpaketSPX/logo_spx.png" alt="Logo SPX" style="height: 32px; vertical-align: middle; margin-right: 10px;">📦 Scan Paket SPX</h1>
            <div class="subtitle">Optimasi Safari iPhone & Scanner</div>
            
            <div class="action-grid">
                <button id="btnCopy" class="btn-success">📲 Share (Return)</button>
                <button id="btnSharePickup" class="btn-warning" style="background-color: #ff9500; color: #fff;">📲 Share (Pickup)</button>
                <button id="btnCopyResiOnly" class="btn-info">📋 Copy Hanya Resi</button>
                <button id="btnExport" class="btn-primary">⬇️ Export Excel</button>
            </div>
        </header>

        <!-- Selector Card -->
        <div class="card">
            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <label for="sellerInput">Nama Seller</label>
                    <input type="text" id="sellerInput" placeholder="Ketik nama seller..." style="width: 100%; border-radius: 10px; border: 1px solid var(--ios-border); padding: 0.6rem; font-size: 1rem; background: var(--ios-input-bg); color: var(--ios-text);">
                </div>
                <div class="form-group" style="width: 60px;">
                    <label>Foto</label>
                    <label for="photoInput" id="photoLabel" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 42px; border-radius: 10px; border: 1px solid var(--ios-border); background: var(--ios-input-bg); cursor: pointer; font-size: 1.2rem; overflow: hidden; position: relative;">
                        📷
                    </label>
                    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
                </div>
                <div class="form-group" style="width: 80px;">
                    <label for="tripSelect">Trip</label>
                    <select-wrapper>
                        <select id="tripSelect">
                            <option value="1" selected>1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </select-wrapper>
                </div>
            </div>

            <!-- Input Scan Form -->
            <form id="scanForm" action="javascript:void(0);" onsubmit="return false;" class="form-group" style="margin-bottom: 0;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                    <label for="scanInput" style="margin: 0;">Scan Resi / Barcode</label>
                    <div style="display: flex; gap: 15px;">
                        <span id="btnCameraOpen" style="color: var(--ios-blue); font-weight: 600; font-size: 0.9rem; cursor: pointer;">📷 Kamera</span>
                    </div>
                </div>
                <div class="scan-wrapper">
                    <input type="text" id="scanInput" placeholder="Scan barcode..." autocomplete="off">
                    <button type="submit" class="btn-info" style="width: 44px; height: 44px; padding: 0; flex-shrink: 0; border-radius: 10px;">➕</button>
                    <button type="button" id="btnSoundToggle" class="sound-toggle-btn active" title="Ubah Suara Beep">🔊</button>
                </div>
            </form>
        </div>

        <!-- History/List Section -->
        <div>
            <div class="list-header">
                <h2>Riwayat Scan</h2>
                <div class="list-header-actions">
                    <span id="btnAllQR" style="color: var(--ios-blue); font-weight: 600; font-size: 0.9rem; cursor: pointer;">📲 Slide QR</span>
                    <span class="reset-link" id="btnClear">🗑️ Kosongkan Data</span>
                </div>
            </div>
            
            <div style="margin-bottom: 1rem;">
                <input type="text" id="searchInput" placeholder="🔍 Cari nomor resi atau seller..." autocomplete="off">
            </div>

            <div class="records-list" id="recordsList">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>Belum ada data scan.</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div style="text-align: center; margin-top: 2rem; margin-bottom: 1rem; font-size: 0.85rem; color: var(--ios-text-muted); opacity: 0.8;">
            &copy; 2026 <strong>Mbah Sugeng</strong>. All Rights Reserved.
        </div>
    </div>

    <!-- Camera Modal (Bottom Sheet) -->
    <div class="modal-overlay" id="cameraModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>📷 Scan Barcode Kamera</h3>
                <button type="button" class="modal-close" id="btnCameraCloseModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="qr-reader" style="width: 100%; border-radius: 12px; overflow: hidden; background: #000;"></div>
            </div>
        </div>
    </div>

    <!-- Bulk modal removed -->

    <!-- QR Code / Slideshow Modal -->
    <div class="qr-modal-overlay" id="qrModalOverlay">
        <div class="qr-card-ios">
            <div class="qr-tag-ios" id="qrTagLabel">1 / 1</div>
            <div class="qr-code-wrapper" id="qrBox"></div>
            <div class="qr-resi-label" id="qrResiLabel">—</div>
            
            <div class="qr-nav-buttons">
                <button type="button" id="qrPrevBtn">◀ Prev</button>
                <button type="button" id="qrAutoBtn" style="flex: 0.8; font-weight: bold; color: var(--ios-green);">▶ Auto</button>
                <button type="button" id="qrNextBtn">Next ▶</button>
            </div>

            <div class="qr-action-buttons">
                <button type="button" id="qrDownloadBtn" class="qr-btn-download">💾 Simpan</button>
                <button type="button" id="qrShareBtn" class="qr-btn-share">↗ Bagikan</button>
            </div>
            
            <button type="button" id="qrCloseBtn" class="qr-btn-close">Tutup</button>
        </div>
    </div>

    <!-- iOS Custom Alert Dialog -->
    <div class="ios-alert-overlay" id="iosAlert">
        <div class="ios-alert-card">
            <h3 class="ios-alert-title" id="iosAlertTitle">Peringatan</h3>
            <p class="ios-alert-message" id="iosAlertMessage">Pesan peringatan di sini.</p>
            <div class="ios-alert-buttons" id="iosAlertButtons">
                <button class="ios-btn-ok" id="iosAlertBtnOk">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Theme initialization
        const savedTheme = localStorage.getItem('return_spx_theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const btnThemeToggle = document.getElementById('btnThemeToggle');
            btnThemeToggle.textContent = savedTheme === 'light' ? '🌙' : '☀️';

            btnThemeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'light') {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('return_spx_theme', 'dark');
                    btnThemeToggle.textContent = '☀️';
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('return_spx_theme', 'light');
                    btnThemeToggle.textContent = '🌙';
                }
            });

            const tripSelect = document.getElementById('tripSelect');
            const scanForm = document.getElementById('scanForm');
            const scanInput = document.getElementById('scanInput');
            const recordsList = document.getElementById('recordsList');
            const btnExport = document.getElementById('btnExport');
            const btnCopy = document.getElementById('btnCopy');
            const btnCopyResiOnly = document.getElementById('btnCopyResiOnly');
            const btnClear = document.getElementById('btnClear');
            const btnSoundToggle = document.getElementById('btnSoundToggle');
            const btnAllQR = document.getElementById('btnAllQR');
            const searchInput = document.getElementById('searchInput');

            searchInput.addEventListener('input', (e) => {
                renderList(e.target.value.trim().toLowerCase());
            });

            // Camera Scanner Elements
            const btnCameraOpen = document.getElementById('btnCameraOpen');
            const cameraModal = document.getElementById('cameraModal');
            const btnCameraCloseModal = document.getElementById('btnCameraCloseModal');
            let html5QrCode = null;
            let isAlertShowing = false;
            let lastScannedResi = "";
            let scanTimeout = null;

            function onScanSuccess(decodedText, decodedResult) {
                if (isAlertShowing) return;
                
                if (decodedText === lastScannedResi) return;
                
                lastScannedResi = decodedText;
                if (scanTimeout) clearTimeout(scanTimeout);
                scanTimeout = setTimeout(() => {
                    lastScannedResi = "";
                }, 2000);

                scanInput.value = decodedText;
                scanForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
            }

            function onScanFailure(error) {
                // Ignore failure
            }

            function openCameraModal() {
                cameraModal.classList.add('active');
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("qr-reader");
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 15 },
                        onScanSuccess,
                        onScanFailure
                    ).catch(err => {
                        closeCameraModal();
                        showIosAlert('Kamera Gagal', 'Kamera belakang tidak dapat diakses. Pastikan Anda memberi izin kamera dan menggunakan koneksi HTTPS.');
                    });
                }
            }

            function closeCameraModal() {
                cameraModal.classList.remove('active');
                if (html5QrCode) {
                    html5QrCode.stop().then(() => {
                        html5QrCode.clear();
                        html5QrCode = null;
                    }).catch(error => {
                        html5QrCode.clear();
                        html5QrCode = null;
                    });
                }
                setTimeout(() => scanInput.focus(), 50);
            }

            btnCameraOpen.addEventListener('click', openCameraModal);
            btnCameraCloseModal.addEventListener('click', closeCameraModal);
            cameraModal.addEventListener('click', (e) => {
                if (e.target === cameraModal) closeCameraModal();
            });

            // Bulk elements removed

            const STORAGE_KEY = 'scan_paket_spx_data';
            let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            let soundEnabled = true;

            // Initialize UI
            renderList();

            // Toggle Audio Sound
            btnSoundToggle.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                if (soundEnabled) {
                    btnSoundToggle.classList.add('active');
                    btnSoundToggle.textContent = '🔊';
                    playBeep('success');
                } else {
                    btnSoundToggle.classList.remove('active');
                    btnSoundToggle.textContent = '🔇';
                }
                scanInput.focus();
            });

            // Web Audio API Beep generator
            function playBeep(type) {
                if (!soundEnabled) return;
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    if (type === 'success') {
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // High pitch beep
                        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                        oscillator.start();
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                        oscillator.stop(audioCtx.currentTime + 0.15);
                    } else if (type === 'error') {
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Low buzz
                        gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                        oscillator.start();
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                        oscillator.stop(audioCtx.currentTime + 0.3);
                    }
                } catch (e) {
                    console.log('Audio Context error:', e);
                }
            }

            // Voice generator (Female Indonesian)
            function playVoice(text) {
                if (!soundEnabled) return;
                try {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'id-ID';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.2;
                    window.speechSynthesis.speak(utterance);
                } catch (e) {
                    console.log('Speech synthesis error:', e);
                }
            }

            // Custom iOS Alert Promise helper
            function showIosAlert(title, message) {
                playBeep('error');
                isAlertShowing = true;
                return new Promise((resolve) => {
                    document.getElementById('iosAlertTitle').textContent = title;
                    document.getElementById('iosAlertMessage').textContent = message;
                    const container = document.getElementById('iosAlertButtons');
                    container.innerHTML = '';
                    
                    const btnOk = document.createElement('button');
                    btnOk.className = 'btn-bold';
                    btnOk.textContent = 'OK';
                    btnOk.addEventListener('click', () => {
                        document.getElementById('iosAlert').classList.remove('active');
                        setTimeout(() => { isAlertShowing = false; }, 500); // delay reset so camera doesn't instantly scan on click
                        resolve();
                    });
                    container.appendChild(btnOk);
                    
                    document.getElementById('iosAlert').classList.add('active');
                });
            }

            // Custom iOS Confirm Promise helper
            function showIosConfirm(title, message, confirmText = 'Hapus') {
                return new Promise((resolve) => {
                    document.getElementById('iosAlertTitle').textContent = title;
                    document.getElementById('iosAlertMessage').textContent = message;
                    const container = document.getElementById('iosAlertButtons');
                    container.innerHTML = '';
                    
                    const btnCancel = document.createElement('button');
                    btnCancel.textContent = 'Batal';
                    btnCancel.addEventListener('click', () => {
                        document.getElementById('iosAlert').classList.remove('active');
                        resolve(false);
                    });
                    
                    const divider = document.createElement('div');
                    divider.className = 'ios-divider';
                    
                    const btnConfirm = document.createElement('button');
                    btnConfirm.className = 'btn-danger-ios btn-bold';
                    btnConfirm.textContent = confirmText;
                    btnConfirm.addEventListener('click', () => {
                        document.getElementById('iosAlert').classList.remove('active');
                        resolve(true);
                    });
                    
                    container.appendChild(btnCancel);
                    container.appendChild(divider);
                    container.appendChild(btnConfirm);
                    
                    document.getElementById('iosAlert').classList.add('active');
                });
            }

            // Form Submit Scanner
            scanForm.onsubmit = function(e) {
                if (e && e.preventDefault) e.preventDefault();
                
                const resi = scanInput.value.trim();
                const trip = tripSelect.value;
                const seller = document.getElementById('sellerInput').value.trim() || '-';

                if (!resi) return false;

                // Validasi awalan SPX atau ID
                if (!resi.startsWith('SPX') && !resi.startsWith('ID')) {
                    playVoice('Resi tidak valid');
                    showIosAlert('Resi Salah', '⚠️ PERINGATAN: Hanya resi dengan awalan "SPX" atau "ID" yang bisa di-scan!').then(() => {
                        scanInput.value = '';
                        setTimeout(() => scanInput.focus(), 50);
                    });
                    return false;
                }

                // Anti Double Resi
                const isDuplicate = records.some(r => r.resi === resi);
                if (isDuplicate) {
                    playVoice('Paket Double');
                    showIosAlert('Resi Duplikat', '⚠️ PERINGATAN: Resi "' + resi + '" sudah pernah di-scan! Data DITOLAK.').then(() => {
                        scanInput.value = '';
                        setTimeout(() => scanInput.focus(), 50);
                    });
                    return false;
                }

                playBeep('success');
                addRecord(trip, seller, resi);
                scanInput.value = '';
                setTimeout(() => scanInput.focus(), 50);
                
                return false;
            };

            tripSelect.addEventListener('change', () => scanInput.focus());

            // Auto-process pasted text in Scan Input
            scanInput.addEventListener('paste', function(e) {
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                const matches = text.match(/(?:SPX|ID)[A-Z0-9]+/gi);
                
                if (matches && matches.length > 0) {
                    e.preventDefault();
                    const cleanMatches = matches.map(m => m.toUpperCase());
                    const trip = tripSelect.value;
                    const seller = document.getElementById('sellerInput').value.trim() || '-';

                    if (cleanMatches.length === 1) {
                        const resi = cleanMatches[0];
                        // Anti Double Resi
                        const isDuplicate = records.some(r => r.resi === resi);
                        if (isDuplicate) {
                            playVoice('Paket Double');
                            showIosAlert('Resi Duplikat', '⚠️ PERINGATAN: Resi "' + resi + '" sudah pernah di-scan! Data DITOLAK.').then(() => {
                                scanInput.value = '';
                                setTimeout(() => scanInput.focus(), 50);
                            });
                            return;
                        }
                        playBeep('success');
                        addRecord(trip, seller, resi);
                        scanInput.value = '';
                        setTimeout(() => scanInput.focus(), 50);
                    } else {
                        // Proses bulk dari paste
                        let successCount = 0;
                        let dupCount = 0;
                        const toAdd = [];
                        const seenInBatch = new Set();

                        cleanMatches.forEach(resi => {
                            const isDuplicate = records.some(r => r.resi === resi) || seenInBatch.has(resi);
                            if (isDuplicate) {
                                dupCount++;
                                return;
                            }
                            seenInBatch.add(resi);
                            toAdd.push(resi);
                        });

                        if (toAdd.length > 0) {
                            addRecordsBulk(trip, seller, toAdd);
                            successCount = toAdd.length;
                            playBeep('success');
                        }

                        if (dupCount > 0) {
                            playVoice('Ada Paket Double');
                        }

                        // Show custom iOS alert summary
                        let message = `Berhasil ditambahkan: ${successCount} resi\n`;
                        if (dupCount > 0) {
                            message += `⚠️ Duplikat (Diabaikan): ${dupCount} resi\n`;
                        }

                        showIosAlert('Proses Bulk Selesai', message).then(() => {
                            scanInput.value = '';
                            setTimeout(() => scanInput.focus(), 50);
                        });
                    }
                }
            });

            function addRecord(trip, seller, resi) {
                const groupRecords = records.filter(r => r.trip === trip && r.seller === seller);
                const noUrut = groupRecords.length + 1;

                const now = new Date();
                const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

                const newRecord = {
                    id: Date.now().toString(),
                    timestamp,
                    trip,
                    seller,
                    noUrut,
                    resi
                };

                records.unshift(newRecord); 
                saveData();
                renderList();
            }

            function addRecordsBulk(trip, seller, resiList) {
                const now = new Date();
                const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

                let currentGroupCount = records.filter(r => r.trip === trip && r.seller === seller).length;

                resiList.forEach((resi) => {
                    currentGroupCount++;
                    const newRecord = {
                        id: (Date.now() + Math.random()).toString(),
                        timestamp,
                        trip,
                        seller,
                        noUrut: currentGroupCount,
                        resi
                    };
                    records.unshift(newRecord);
                });

                saveData();
                renderList();
            }

            function deleteRecord(id) {
                showIosConfirm('Hapus Data', 'Apakah Anda yakin ingin menghapus baris ini?').then((confirmed) => {
                    if (confirmed) {
                        records = records.filter(r => r.id !== id);
                        recalculateSequence();
                        saveData();
                        renderList();
                    }
                });
            }

            function recalculateSequence() {
                const chronological = [...records].reverse();
                const counts = {};
                
                chronological.forEach(r => {
                    const key = `trip_${r.trip}_seller_${r.seller || '-'}`;
                    if(!counts[key]) counts[key] = 0;
                    counts[key]++;
                    r.noUrut = counts[key];
                });
                
                records = chronological.reverse();
            }

            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            }

            function renderList(filterText = '') {
                recordsList.innerHTML = '';
                
                const filteredRecords = filterText 
                    ? records.filter(r => r.resi.toLowerCase().includes(filterText))
                    : records;

                if (filteredRecords.length === 0) {
                    recordsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>${records.length === 0 ? 'Belum ada data scan.' : 'Pencarian tidak ditemukan.'}</p>
                        </div>
                    `;
                    return;
                }

                filteredRecords.forEach((record) => {
                    const index = records.indexOf(record);
                    const div = document.createElement('div');
                    div.className = 'record-card';
                    div.innerHTML = `
                        <div class="record-details" data-index="${index}" style="cursor: pointer;">
                            <div class="record-resi">${record.resi}</div>
                            <div class="record-meta">
                                <span class="badge-trip">Trip ${record.trip}</span>
                                <span style="color: var(--ios-blue); font-weight: 600;">No. ${record.noUrut}</span>
                                <span class="badge-trip" style="background: #e5e5ea; color: #333;">${record.seller || '-'}</span>
                                <span class="record-time">${record.timestamp.split(' ')[1]}</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.2rem;">
                            <button class="btn-qr-row" data-index="${index}">📱</button>
                            <button class="btn-delete-row" data-id="${record.id}" title="Hapus">✕</button>
                        </div>
                    `;
                    recordsList.appendChild(div);
                });

                // Attach click to open QR from row details
                document.querySelectorAll('.record-details').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.getAttribute('data-index'), 10);
                        openQRModal(idx);
                    });
                });

                // Attach click to open QR from row QR button
                document.querySelectorAll('.btn-qr-row').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(btn.getAttribute('data-index'), 10);
                        openQRModal(idx);
                    });
                });

                // Attach individual deletes
                document.querySelectorAll('.btn-delete-row').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteRecord(btn.getAttribute('data-id'));
                    });
                });
            }

            function generateReportData() {
                const groups = {};
                const chronologicalRecords = [...records].reverse();
                
                chronologicalRecords.forEach(r => {
                    const key = `trip_${r.trip}_seller_${r.seller || '-'}`;
                    if (!groups[key]) {
                        groups[key] = { trip: r.trip, seller: r.seller || '-', resis: [] };
                    }
                    groups[key].resis.push({ noUrut: r.noUrut, resi: r.resi });
                });

                const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                const now = new Date();
                const dateStr = `${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;

                return { groups, dateStr };
            }

            // Universal Safe Clipboard Copy function for iOS Safari
            function copyTextToClipboard(text, successMessage) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        showIosAlert('Berhasil', successMessage);
                    }).catch(err => {
                        fallbackCopy(text, successMessage);
                    });
                } else {
                    fallbackCopy(text, successMessage);
                }
            }

            function fallbackCopy(text, successMessage) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                
                // iOS safe selection style
                textArea.style.position = 'fixed';
                textArea.style.top = '0';
                textArea.style.left = '0';
                textArea.style.width = '2em';
                textArea.style.height = '2em';
                textArea.style.padding = '0';
                textArea.style.border = 'none';
                textArea.style.outline = 'none';
                textArea.style.boxShadow = 'none';
                textArea.style.background = 'transparent';
                
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                // iOS range selection
                const range = document.createRange();
                range.selectNodeContents(textArea);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                textArea.setSelectionRange(0, 999999);

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        showIosAlert('Berhasil', successMessage);
                    } else {
                        showIosAlert('Gagal', 'Gagal menyalin teks. Silakan ekspor ke Excel.');
                    }
                } catch (err) {
                    showIosAlert('Gagal', 'Peramban tidak mendukung penyalinan otomatis.');
                }
                
                document.body.removeChild(textArea);
            }

            // SHARE RETURN TO WHATSAPP
            btnCopy.addEventListener('click', function() {
                if (records.length === 0) {
                    showIosAlert('Data Kosong', 'Tidak ada data untuk disalin!');
                    return;
                }

                const data = generateReportData();
                const groups = data.groups;
                const dateStr = data.dateStr;
                let report = [];

                for (const key in groups) {
                    const g = groups[key];
                    report.push(`Return ${g.seller}`);
                    report.push(dateStr);
                    report.push(`Trip ${g.trip}`);
                    
                    g.resis.sort(function(a,b) { return a.noUrut - b.noUrut; });
                    g.resis.forEach(function(item) {
                        report.push(`${item.noUrut}. ${item.resi}`);
                    });
                    report.push('Keterangan: ');
                    report.push(''); // blank line
                }

                const finalString = report.join('\n').trim();
                
                if (navigator.share) {
                    const shareData = {
                        title: 'Data Return',
                        text: finalString
                    };
                    
                    if (currentPhotoFile && navigator.canShare) {
                        const filesArray = [new File([currentPhotoFile], "bukti_return.jpg", { type: currentPhotoFile.type })];
                        if (navigator.canShare({ files: filesArray })) {
                            shareData.files = filesArray;
                        }
                    }
                    
                    navigator.share(shareData).then(function() {
                        currentPhotoFile = null;
                        photoLabel.innerHTML = '📷';
                        photoInput.value = '';
                    }).catch(function(err) {
                        if (err.name !== 'AbortError') {
                            copyTextToClipboard(finalString, 'Teks disalin (Gagal membagikan foto).');
                        }
                    });
                } else {
                    copyTextToClipboard(finalString, 'Laporan berhasil disalin! (Peramban tidak mendukung fitur Share gambar)');
                }
            });

            // SHARE PICKUP TO WHATSAPP
            const btnSharePickup = document.getElementById('btnSharePickup');
            const photoInput = document.getElementById('photoInput');
            const photoLabel = document.getElementById('photoLabel');
            let currentPhotoFile = null;

            if (photoInput) {
                photoInput.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) {
                        currentPhotoFile = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            photoLabel.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover;">`;
                        };
                        reader.readAsDataURL(currentPhotoFile);
                    } else {
                        currentPhotoFile = null;
                        photoLabel.innerHTML = '📷';
                    }
                });
            }

            if (btnSharePickup) {
                btnSharePickup.addEventListener('click', function() {
                    const currentTrip = tripSelect.value;
                    const currentSeller = document.getElementById('sellerInput').value.trim() || '-';
                    
                    const groupRecords = records.filter(function(r) { return r.trip === currentTrip && (r.seller || '-') === currentSeller; });
                    
                    if (groupRecords.length === 0) {
                        showIosAlert('Data Kosong', `Tidak ada data untuk Seller "${currentSeller}" di Trip ${currentTrip}.`);
                        return;
                    }

                    const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                    const now = new Date();
                    const dateStr = `${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;

                    let report = [];
                    report.push(`Pickup ${currentSeller}`);
                    report.push(dateStr);
                    report.push(`Trip ${currentTrip}`);
                    
                    groupRecords.sort(function(a,b) { return a.noUrut - b.noUrut; });
                    groupRecords.forEach(function(item) {
                        report.push(`${item.noUrut}. ${item.resi}`);
                    });
                    report.push('Keterangan: Paket sudah di-pickup');
                    
                    const finalString = report.join('\n').trim();

                    // Web Share API
                    if (navigator.share) {
                        const shareData = {
                            title: 'Daftar Pickup',
                            text: finalString
                        };
                        
                        if (currentPhotoFile && navigator.canShare) {
                            const filesArray = [new File([currentPhotoFile], "bukti_pickup.jpg", { type: currentPhotoFile.type })];
                            if (navigator.canShare({ files: filesArray })) {
                                shareData.files = filesArray;
                            }
                        }
                        
                        navigator.share(shareData).then(function() {
                            // Clear photo after successful share
                            currentPhotoFile = null;
                            photoLabel.innerHTML = '📷';
                            photoInput.value = '';
                        }).catch(function(err) {
                            if (err.name !== 'AbortError') {
                                copyTextToClipboard(finalString, 'Teks disalin (Gagal membagikan foto).');
                            }
                        });
                    } else {
                        copyTextToClipboard(finalString, 'Daftar Pickup disalin! (Peramban tidak mendukung fitur Share gambar)');
                    }
                });
            }

            // COPY ONLY RESIS
            btnCopyResiOnly.addEventListener('click', () => {
                if (records.length === 0) {
                    showIosAlert('Data Kosong', 'Tidak ada data untuk disalin!');
                    return;
                }

                const resis = [...records].reverse().map(r => r.resi);
                const finalString = resis.join('\n');
                copyTextToClipboard(finalString, 'Resi berhasil disalin!');
            });

            // EXPORT TO EXCEL
            btnExport.addEventListener('click', () => {
                if (records.length === 0) {
                    showIosAlert('Data Kosong', 'Tidak ada data untuk diexport!');
                    return;
                }

                const { groups, dateStr } = generateReportData();
                const aoa = [];

                for (const key in groups) {
                    const g = groups[key];
                    aoa.push([`Data Paket SPX/ID`]);
                    aoa.push([dateStr]);
                    aoa.push([`Trip ${g.trip} | Seller: ${g.seller}`]);
                    
                    g.resis.sort((a,b) => a.noUrut - b.noUrut);
                    g.resis.forEach(item => {
                        aoa.push([`${item.noUrut}. ${item.resi}`]);
                    });
                    aoa.push(['']);
                }

                const worksheet = XLSX.utils.aoa_to_sheet(aoa);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Data Return");

                const now = new Date();
                const fileDateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                
                XLSX.writeFile(workbook, `Rekap_Return_${fileDateStr}.xlsx`);
            });

            // CLEAR ALL DATA
            btnClear.addEventListener('click', function() {
                if (records.length === 0) return;
                showIosConfirm(
                    'Kosongkan Data', 
                    'PERINGATAN! Anda akan menghapus SEMUA data dari layar.\nPastikan Anda sudah menyalin atau mengekspor data.\n\nLanjutkan?',
                    'Kosongkan'
                ).then(function(confirmed) {
                    if (confirmed) {
                        records = [];
                        saveData();
                        renderList();
                    }
                });
            });

            // ================== QR CODE MODAL & SLIDESHOW LOGIC ==================
            let qrIndex = 0;
            let autoSlideInterval = null;

            function stopAutoSlide() {
                if (autoSlideInterval) {
                    clearInterval(autoSlideInterval);
                    autoSlideInterval = null;
                    const btn = document.getElementById('qrAutoBtn');
                    btn.innerHTML = '▶ Auto';
                    btn.style.color = 'var(--ios-green)';
                }
            }

            function toggleAutoSlide() {
                const btn = document.getElementById('qrAutoBtn');
                if (autoSlideInterval) {
                    stopAutoSlide();
                } else {
                    btn.innerHTML = '⏸ Stop';
                    btn.style.color = 'var(--ios-red)';
                    
                    // If already at the end, restart from beginning
                    if (qrIndex === records.length - 1) {
                        qrIndex = 0;
                        renderQR();
                    }
                    
                    autoSlideInterval = setInterval(() => {
                        if (qrIndex < records.length - 1) {
                            qrIndex++;
                            renderQR();
                        } else {
                            stopAutoSlide();
                        }
                    }, 1250); // 1.25 seconds per slide (2x lebih cepat)
                }
            }

            function openQRModal(index) {
                if (records.length === 0) return;
                qrIndex = index;
                document.getElementById('qrModalOverlay').classList.add('active');
                renderQR();
            }

            function renderQR() {
                const record = records[qrIndex];
                document.getElementById('qrResiLabel').textContent = record.resi;
                document.getElementById('qrTagLabel').textContent = `${qrIndex + 1} / ${records.length} • (Trip ${record.trip})`;

                const box = document.getElementById('qrBox');
                box.innerHTML = '';

                // Draw QR Code
                new QRCode(box, {
                    text: record.resi,
                    width: 220,
                    height: 220,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });

                // Update nav buttons state
                document.getElementById('qrPrevBtn').disabled = qrIndex === 0;
                document.getElementById('qrNextBtn').disabled = qrIndex === records.length - 1;
            }

            function closeQRModal() {
                stopAutoSlide();
                document.getElementById('qrModalOverlay').classList.remove('active');
                document.getElementById('qrBox').innerHTML = '';
                setTimeout(() => scanInput.focus(), 50);
            }

            document.getElementById('qrCloseBtn').addEventListener('click', closeQRModal);
            
            document.getElementById('qrAutoBtn').addEventListener('click', toggleAutoSlide);
            
            document.getElementById('qrPrevBtn').addEventListener('click', () => {
                stopAutoSlide();
                if (qrIndex > 0) {
                    qrIndex--;
                    renderQR();
                }
            });
            document.getElementById('qrNextBtn').addEventListener('click', () => {
                stopAutoSlide();
                if (qrIndex < records.length - 1) {
                    qrIndex++;
                    renderQR();
                }
            });

            document.getElementById('qrModalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('qrModalOverlay')) {
                    closeQRModal();
                }
            });

            // Get canvas inside QR box
            function getQRCanvas() {
                return document.getElementById('qrBox').querySelector('canvas');
            }

            // Download QR
            document.getElementById('qrDownloadBtn').addEventListener('click', () => {
                const canvas = getQRCanvas();
                if (canvas) {
                    const record = records[qrIndex];
                    const link = document.createElement('a');
                    link.download = `QR_${record.resi}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }
            });

            // Share QR (Safe for iOS Safari Web Share)
            document.getElementById('qrShareBtn').addEventListener('click', () => {
                const canvas = getQRCanvas();
                if (canvas) {
                    const record = records[qrIndex];
                    if (navigator.share && navigator.canShare) {
                        canvas.toBlob((blob) => {
                            const file = new File([blob], `QR_${record.resi}.png`, { type: 'image/png' });
                            if (navigator.canShare({ files: [file] })) {
                                navigator.share({ files: [file], title: `QR ${record.resi}` })
                                    .catch(err => console.log('Share canceled or failed:', err));
                            } else {
                                // fallback download
                                document.getElementById('qrDownloadBtn').click();
                            }
                        });
                    } else {
                        // fallback download
                        document.getElementById('qrDownloadBtn').click();
                    }
                }
            });

            // Slide QR button next to header
            btnAllQR.addEventListener('click', () => {
                if (records.length === 0) {
                    showIosAlert('Data Kosong', 'Belum ada resi untuk ditampilkan!');
                    return;
                }
                openQRModal(0); // Start from first record (newest)
            });

            // DEVICE LOCK LOGIC
            const validateDevice = () => {
                const isVerified = localStorage.getItem('device_verified');
                if (isVerified === 'true') return;
                
                const pin = prompt('Aplikasi Terkunci!\nMasukkan PIN aktivasi perangkat untuk melanjutkan:');
                if (pin === '888888') {
                    localStorage.setItem('device_verified', 'true');
                    alert('Perangkat berhasil diaktivasi!');
                } else {
                    alert('PIN Salah! Akses ditolak.');
                    document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:20px;"><div><h1>Akses Ditolak</h1><p>Silakan hubungi administrator (Mbah Sugeng) untuk mendapatkan PIN aktivasi perangkat Anda.</p></div></div>';
                    throw new Error('Device not verified');
                }
            };
            validateDevice();
        });
    </script>
</body>
</html>
