<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scan SPX">
    <title>Scan Paket SPX</title>

    <meta property="og:title" content="Scan Paket SPX">
    <meta property="og:description" content="Optimasi Safari iPhone & Scanner">
    <meta property="og:image" content="scanpaketSPX/spx.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root { --ios-blue: #007aff; --ios-green: #34c759; --ios-red: #ff3b30; --ios-bg: #000000; --ios-card-bg: #1c1c1e; --ios-text: #ffffff; --ios-text-muted: #8e8e93; --ios-border: #38383a; --ios-input-bg: #2c2c2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background-color: var(--ios-bg); color: var(--ios-text); padding: 2rem 1rem; line-height: 1.4; }
        .container { max-width: 600px; margin: 0 auto; }
        header { margin-bottom: 1.5rem; text-align: center; }
        .title-wrapper { display: inline-flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 0.5rem; width: 100%; }
        h1 { font-size: 1.8rem; font-weight: 700; order: 2; }
        .title-logo-box { width: 42px; height: 42px; background-color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 6px; flex-shrink: 0; order: 1; overflow: hidden; }
        .title-logo-display { width: 100%; height: 100%; object-fit: cover; transform: scale(1.5); }
        .subtitle { font-size: 0.9rem; color: var(--ios-text-muted); margin-bottom: 1.2rem; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.5rem; }
        button { font-family: inherit; font-size: 14px; font-weight: 600; border: none; border-radius: 12px; padding: 0.8rem; cursor: pointer; height: 48px; }
        .btn-success { background-color: var(--ios-green); color: white; }
        .btn-info { background-color: var(--ios-blue); color: white; }
        .btn-primary { background-color: var(--ios-border); color: white; }
        .btn-warning { background-color: #ff9500; color: white; }
        .card { background-color: var(--ios-card-bg); border-radius: 14px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--ios-border); }
        input, select { width: 100%; background-color: var(--ios-input-bg); color: var(--ios-text); border: 1px solid var(--ios-border); border-radius: 10px; padding: 0.75rem; height: 44px; }
        .record-card { background-color: var(--ios-card-bg); border: 1px solid var(--ios-border); border-radius: 12px; padding: 0.9rem; margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
        .record-resi { font-family: monospace; font-size: 1rem; color: var(--ios-blue); font-weight: 700; }
        .empty-state { text-align: center; padding: 2rem; color: var(--ios-text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title-wrapper">
                <h1>📦 Scan Paket SPX</h1>
                <div class="title-logo-box"><img src="scanpaketSPX/spx.jpg" alt="SPX" class="title-logo-display"></div>
            </div>
            <div class="subtitle">Optimasi Safari iPhone & Scanner</div>
            <div class="action-grid">
                <button id="btnCopy" class="btn-success">📲 Return</button>
                <button id="btnSharePickup" class="btn-warning">📲 Pickup</button>
                <button id="btnCopyResiOnly" class="btn-info">📋 Copy Resi</button>
                <button id="btnExport" class="btn-primary">⬇️ Export</button>
            </div>
        </header>

        <div class="card">
            <div class="form-row" style="display:flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="sellerInput" placeholder="Nama Seller...">
                <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;">
                <button onclick="document.getElementById('photoInput').click()" style="width: 60px;">📷</button>
                <select id="tripSelect" style="width: 80px;"><option value="1">1</option><option value="2">2</option></select>
            </div>
            <form id="scanForm" style="display: flex; gap: 10px;">
                <input type="text" id="scanInput" placeholder="Scan Barcode..." autocomplete="off">
                <button type="submit" class="btn-info">➕</button>
            </form>
        </div>

        <div id="recordsList" class="records-list"></div>
    </div>

    <script>
        const STORAGE_KEY = 'scan_paket_spx_data';
        let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentPhotoFile = null;

        document.getElementById('photoInput').addEventListener('change', (e) => currentPhotoFile = e.target.files[0]);

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); renderList(); }

        function renderList() {
            const list = document.getElementById('recordsList'); list.innerHTML = '';
            records.forEach((r, idx) => {
                const div = document.createElement('div'); div.className = 'record-card';
                div.innerHTML = `<div class="record-details"><div class="record-resi">${r.resi}</div><div style="font-size:0.8rem">Trip ${r.trip} | ${r.seller}</div></div><button onclick="deleteRow(${idx})">❌</button>`;
                list.appendChild(div);
            });
        }

        function deleteRow(idx) { records.splice(idx, 1); saveData(); }

        document.getElementById('scanForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const resi = document.getElementById('scanInput').value.trim();
            if (!resi) return;
            records.unshift({ resi, trip: document.getElementById('tripSelect').value, seller: document.getElementById('sellerInput').value || '-' });
            document.getElementById('scanInput').value = '';
            saveData();
        });

        // FUNGSI SHARE RETURN
        document.getElementById('btnCopy').addEventListener('click', async () => {
            let text = "Data Return:\n" + records.map(r => r.resi).join('\n');
            if (navigator.share) {
                const shareData = { text: text };
                if (currentPhotoFile) shareData.files = [new File([currentPhotoFile], "bukti.jpg", { type: currentPhotoFile.type })];
                await navigator.share(shareData);
            } else { alert("Data disalin!"); navigator.clipboard.writeText(text); }
        });

        // FUNGSI SHARE PICKUP
        document.getElementById('btnSharePickup').addEventListener('click', async () => {
            let text = "Data Pickup:\n" + records.map(r => r.resi).join('\n');
            if (navigator.share) {
                const shareData = { text: text };
                if (currentPhotoFile) shareData.files = [new File([currentPhotoFile], "bukti.jpg", { type: currentPhotoFile.type })];
                await navigator.share(shareData);
            } else { alert("Data disalin!"); navigator.clipboard.writeText(text); }
        });

        // FUNGSI COPY HANYA RESI
        document.getElementById('btnCopyResiOnly').addEventListener('click', () => {
            navigator.clipboard.writeText(records.map(r => r.resi).join('\n'));
            alert("Resi disalin!");
        });

        document.getElementById('btnExport').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(records); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "DataScan.xlsx");
        });
    </script>
</body>
</html>
