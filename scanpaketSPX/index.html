<script>
  (function() {
    // 1. Cek apakah user sudah berhasil aktivasi sebelumnya di sesi ini
    if (sessionStorage.getItem("spx_activated") === "true") {
      return; // Jika sudah aktif, lewati proteksi dan buka aplikasi
    }

    // 2. Membuat Device ID unik (6-digit) berdasarkan perangkat klien
    // Menggunakan trik manipulasi string userAgent agar menghasilkan angka yang konsisten di PC yang sama
    function generateDeviceID() {
      let info = navigator.userAgent + (navigator.hardwareConcurrency || 4) + screen.width;
      let hash = 0;
      for (let i = 0; i < info.length; i++) {
        hash = (hash << 5) - hash + info.charCodeAt(i);
        hash |= 0; 
      }
      // Pastikan hasil positif dan ambil 6 digit terakhir
      let idPositif = Math.abs(hash).toString();
      return idPositif.slice(-6).padStart(6, '1');
    }

    const clientDeviceID = generateDeviceID();

    // 3. Sembunyikan isi aplikasi asli agar tidak bisa diintip sebelum memasukkan PIN
    const originalContent = document.body.innerHTML;
    document.body.innerHTML = `
      <div id="lockScreen" style="
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif;
        display: flex; justify-content: center; align-items: center; z-index: 999999;
      ">
        <div style="
          background-color: #1e293b; padding: 32px; border-radius: 16px; 
          width: 90%; max-width: 380px; text-align: center; border: 1px solid #334155;
          box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        ">
          <h3 style="color: #ef4444; margin-top: 0;">Aplikasi Terkunci!</h3>
          <p style="color: #94a3b8; font-size: 14px;">Silakan minta PIN Aktivasi kepada Admin.</p>
          
          <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 20px;">
            <span style="font-size: 12px; color: #94a3b8; display:block;">Device ID Anda:</span>
            <strong style="font-size: 20px; color: #10b981; letter-spacing: 2px;">${clientDeviceID}</strong>
          </div>

          <div style="text-align: left; margin-bottom: 20px;">
            <label style="display: block; font-size: 14px; margin-bottom: 8px;">Masukkan PIN Aktivasi:</label>
            <input type="text" id="inputPin" placeholder="Contoh: 888888" maxlength="8" style="
              width: 100%; padding: 12px; border-radius: 8px; background-color: #0f172a;
              border: 1px solid #334155; color: #f8fafc; font-size: 16px; text-align: center; box-sizing: border-box;
            ">
          </div>

          <button id="btnVerifikasi" style="
            width: 100%; padding: 14px; border-radius: 8px; background-color: #10b981;
            color: white; border: none; font-size: 16px; font-weight: 600; cursor: pointer;
          ">Aktivasi Sekarang</button>
        </div>
      </div>
    `;

    // 4. Logika Validasi Pencocokan Kunci
    document.getElementById("btnVerifikasi").addEventListener("click", function() {
      const userPin = document.getElementById("inputPin").value.trim();
      
      // Kumpulan opsi durasi hari yang tersedia di generator Anda
      const listDurasi = [1, 3, 7, 14, 30, 90, 180, 365];
      let pinValid = false;

      // Cek Master PIN Permanen terlebih dahulu
      if (userPin === "888888") {
        pinValid = true;
      } else {
        // Cek rumus matematika untuk setiap kemungkinan durasi hari
        for (let i = 0; i < listDurasi.length; i++) {
          let calc = parseInt(clientDeviceID) * 3 + 777 + (listDurasi[i] * 123);
          let expected = calc.toString().slice(-6);
          
          if (userPin === expected) {
            pinValid = true;
            break;
          }
        }
      }

      // 5. Eksekusi Hasil
      if (pinValid) {
        alert("Aktivasi Berhasil! Selamat bekerja.");
        sessionStorage.setItem("spx_activated", "true"); // Simpan status agar aman saat refresh
        document.body.innerHTML = originalContent; // Kembalikan isi aplikasi asli
        window.location.reload(); // Refresh ringan untuk memicu script bawaan index.html
      } else {
        alert("PIN SALAH! Periksa kembali Device ID atau durasi paket yang Anda berikan.");
      }
    });

  })();
</script>
