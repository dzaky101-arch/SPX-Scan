<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Monitor Pickup Pakdhe - Super OCR V3</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #ee4d2d;
            margin-bottom: 5px;
        }
        .sub-title {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        /* Area Upload Gambar */
        .upload-section {
            border: 2px dashed #ee4d2d;
            background-color: #fffefb;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .upload-section:hover {
            background-color: #fff5f2;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .action-buttons {
            margin-top: 15px;
        }
        .upload-btn {
            background-color: #ee4d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .reset-btn {
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            cursor: pointer;
            border: none;
            margin-left: 10px;
            font-size: 14px;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background-color: #5a6268;
        }
        /* Status Loading Scan */
        #statusScan {
            font-weight: bold;
            color: #333;
            margin: 10px 0;
            display: none;
            text-align: center;
        }
        .summary-card {
            background: linear-gradient(135deg, #ff6b4a, #ee4d2d);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(238, 77, 45, 0.2);
        }
        .summary-card .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }
        .summary-card .counter {
            font-size: 36px;
            font-weight: 800;
            margin: 5px 0;
        }
        .summary-card .sub-text {
            font-size: 12px;
            opacity: 0.8;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        .text-center {
            text-align: center;
        }
        .badge-missed {
            background-color: #ffeaea;
            color: #d93838;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-top: 4px;
        }
        #previewImg {
            max-width: 150px;
            max-height: 150px;
            margin-top: 15px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Tool Monitor & Scan Pickup SPX</h2>
    <div class="sub-title">Algoritma Akurasi Multi-Paket Diperbarui</div>

    <div class="upload-section">
        <p style="margin: 0; color: #555;">📸 Masukkan foto/screenshot SPX terbaru Anda</p>
        <div class="action-buttons">
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()">Pilih Gambar</button>
            <button class="reset-btn" onclick="resetData()">Reset Data</button>
        </div>
        <input type="file" id="imageInput" accept="image/*" onchange="prosesGambar(event)">
        <br>
        <img id="previewImg" alt="Pratinjau Gambar">
    </div>

    <div id="statusScan">⏳ Menghubungkan ke sistem Scanner...</div>

    <div class="summary-card">
        <div class="title">Total Paket Semuanya</div>
        <div class="counter" id="totalPaketBesar">0 Paket</div>
        <div class="sub-text" id="totalTokoText">Dari total 0 lokasi toko terdaftar</div>
    </div>

    <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="🔍 Ketik nama seller untuk menyaring...">

    <table id="pickupTable">
        <thead>
            <tr>
                <th>Nama Seller</th>
                <th class="text-center" style="width: 120px;">Jumlah Paket</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    function prosesGambar(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('previewImg');
            preview.src = e.target.result;
            preview.style.display = 'inline-block';
        }
        reader.readAsDataURL(file);

        const statusDiv = document.getElementById('statusScan');
        statusDiv.style.display = 'block';
        statusDiv.style.color = '#333';
        statusDiv.innerHTML = "⏳ Sedang mengekstrak teks gambar secara detail...";

        Tesseract.recognize(
            file,
            'ind',
            { logger: m => {
                if(m.status === 'recognizing text') {
                    statusDiv.innerHTML = `⏳ Membaca data baris: ${Math.round(m.progress * 100)}%`;
                }
            }}
        ).then(({ data: { text } }) => {
            statusDiv.innerHTML = "✅ Scan Selesai!";
            statusDiv.style.color = "green";
            ekstrakDataTeks(text);
        }).catch(err => {
            console.error(err);
            statusDiv.innerHTML = "❌ Gagal memproses gambar.";
            statusDiv.style.color = "red";
        });
    }

    // Perbaikan Logika: Penjebak Angka Paket yang Valid
    function ekstrakDataTeks(mentahTeks) {
        const baris = mentahTeks.split('\n');
        const tBody = document.getElementById('tableBody');
        
        let dataDitemukan = [];
        let namaSellerSementara = "";
        let isMissed = false;

        for (let i = 0; i < baris.length; i++) {
            let cleanLine = baris[i].trim();
            if (cleanLine.length < 2) continue;

            if (cleanLine.toLowerCase().includes('missed')) {
                isMissed = true;
                continue;
            }

            // Identifikasi Alamat SPX
            if (cleanLine.toLowerCase().includes('jalan') || cleanLine.toLowerCase().includes('villa') || cleanLine.toLowerCase().includes('blok') || cleanLine.toLowerCase().includes('jl.')) {
                let j = i - 1;
                while (j >= 0) {
                    let prevLine = baris[j].trim();
                    if (prevLine.length > 2 && !prevLine.toLowerCase().includes('missed') && !prevLine.toLowerCase().includes('pickup') && !prevLine.toLowerCase().includes('return')) {
                        namaSellerSementara = prevLine.replace(/[^a-zA-Z0-9\s\.\-_]/g, '');
                        break;
                    }
                    j--;
                }
                continue;
            }

            // FILTER PENANGKAP ANGKA: Mengambil angka asli pasca tulisan "Pickup"
            if (cleanLine.toLowerCase().includes('pickup') || cleanLine.toLowerCase().includes('picup')) {
                let jumlahPaket = 1; 
                
                // Cari angka di baris yang sama terlebih dahulu
                let angkaMatch = cleanLine.match(/\d+/);
                if (angkaMatch) {
                    jumlahPaket = parseInt(angkaMatch[0]);
                } else {
                    // Jika tidak ada angka di baris yang sama, cek 1 baris di bawahnya (antisipasi OCR memisah baris tulisan & angka)
                    if (i + 1 < baris.length) {
                        let nextLine = baris[i+1].trim();
                        let angkaBawahMatch = nextLine.match(/^\d+/);
                        if (angkaBawahMatch) {
                            jumlahPaket = parseInt(angkaBawahMatch[0]);
                        }
                    }
                }

                if (namaSellerSementara !== "" && !dataDitemukan.some(d => d.seller === namaSellerSementara)) {
                    dataDitemukan.push({
                        seller: namaSellerSementara,
                        missed: isMissed,
                        paket: jumlahPaket
                    });
                    
                    namaSellerSementara = "";
                    isMissed = false;
                }
            }
        }

        // Tampilkan ke web
        if (dataDitemukan.length > 0) {
            tBody.innerHTML = ""; 
            dataDitemukan.forEach(item => {
                let row = document.createElement('tr');
                let badge = item.missed ? ` <br><span class="badge-missed">Missed</span>` : '';
                row.innerHTML = `
                    <td><strong>${item.seller}</strong>${badge}</td>
                    <td class="text-center data-paket" style="font-weight: bold; color: #ee4d2d;">${item.paket}</td>
                `;
                tBody.appendChild(row);
            });
            hitungTotal();
        } else {
            alert("Sistem tidak mendeteksi teks dengan format SPX. Gunakan foto yang lebih cerah, Pakdhe!");
        }
    }

    function hitungTotal() {
        let rows = document.querySelectorAll("#pickupTable tbody tr");
        let totalPaket = 0;
        let totalTokoTerlihat = 0;

        rows.forEach(row => {
            if (row.style.display !== "none") {
                let cellValue = row.querySelector(".data-paket").innerText;
                totalPaket += parseInt(cellValue) || 0;
                totalTokoTerlihat++;
            }
        });

        document.getElementById("totalPaketBesar").innerText = totalPaket.toLocaleString('id-ID') + " Paket";
        document.getElementById("totalTokoText").innerText = "Dari total " + totalTokoTerlihat + " lokasi toko terdaftar";
    }

    function filterTable() {
        let input = document.getElementById("searchInput");
        let filter = input.value.toUpperCase();
        let table = document.getElementById("pickupTable");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td")[0];
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
        hitungTotal();
    }

    function resetData() {
        document.getElementById('imageInput').value = "";
        const preview = document.getElementById('previewImg');
        preview.src = "";
        preview.style.display = 'none';
        document.getElementById('statusScan').style.display = 'none';
        document.getElementById('searchInput').value = "";
        document.getElementById('tableBody').innerHTML = "";
        hitungTotal();
    }

    window.onload = hitungTotal;
</script>

</body>
</html>
